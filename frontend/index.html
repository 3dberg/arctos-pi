<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1024, initial-scale=1" />
<title>arctos-pi</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { height: 100%; background: #0b0f14; color: #e6edf3; font-family: system-ui, sans-serif; overflow: hidden; }
  .btn { user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .estop { background: #ef4444; }
  .estop:active { background: #b91c1c; }
  .jogbtn { min-width: 72px; min-height: 64px; font-size: 1.8rem; font-weight: 700; }
  .jogbtn.active { background: #2563eb !important; }
  .tabbtn.active { background: #1f2937; color: #e6edf3; }
  .pos { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="w-[1024px] h-[600px] flex flex-col">
  <!-- Top bar -->
  <div class="flex items-center gap-3 p-2 bg-gray-900 border-b border-gray-800">
    <button id="estop" class="btn estop text-white text-2xl font-bold rounded-lg px-6 py-3 shadow-lg">E-STOP</button>
    <div id="status" class="flex-1 text-sm">connecting…</div>
    <button id="enable-btn" class="btn bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg px-4 py-2 font-semibold">Enable</button>
    <button id="disable-btn" class="btn bg-gray-700 text-white rounded-lg px-4 py-2">Disable</button>
  </div>

  <!-- Main -->
  <div class="flex flex-1 min-h-0">
    <!-- Jog pad -->
    <div class="w-[480px] p-3 flex flex-col gap-2 bg-gray-950 border-r border-gray-800">
      <div class="text-xs uppercase tracking-wider text-gray-400 pb-1">Jog</div>
      <div id="jog-axes" class="flex-1 flex flex-col gap-2"></div>
      <div class="flex items-center gap-2 mt-2">
        <span class="text-xs text-gray-400 w-12">speed</span>
        <input id="speed" type="range" min="1" max="100" value="25" class="flex-1 accent-blue-500" />
        <span id="speed-val" class="text-sm w-10 text-right">25%</span>
      </div>

      <div id="gripper-panel" class="hidden mt-2 bg-gray-900 rounded-lg p-2 flex flex-col gap-2">
        <div class="flex items-center gap-2">
          <div class="text-xs uppercase tracking-wider text-gray-400 flex-1">Gripper</div>
          <span id="gripper-pos" class="text-xs text-gray-400 pos">0</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="gripper-open" class="btn bg-gray-700 hover:bg-gray-600 rounded-lg px-3 py-2 text-sm font-semibold">Open</button>
          <input id="gripper-slider" type="range" min="0" max="255" value="0" class="flex-1 accent-amber-500" />
          <button id="gripper-close" class="btn bg-amber-600 hover:bg-amber-500 rounded-lg px-3 py-2 text-sm font-semibold">Close</button>
        </div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="flex-1 flex flex-col min-h-0">
      <div class="flex gap-1 p-2 bg-gray-900 border-b border-gray-800">
        <button data-tab="status" class="tabbtn active rounded px-4 py-2 text-sm">Status</button>
        <button data-tab="config" class="tabbtn rounded px-4 py-2 text-sm">Driver config</button>
      </div>
      <div id="tab-status" class="tabpanel flex-1 p-3 overflow-auto">
        <table class="w-full text-sm">
          <thead class="text-xs text-gray-400">
            <tr><th class="text-left">Axis</th><th class="text-right">Degrees</th><th class="text-right">Pulses</th><th class="text-right">Enabled</th></tr>
          </thead>
          <tbody id="status-body"></tbody>
        </table>
        <button id="refresh-btn" class="mt-3 btn bg-gray-700 rounded px-3 py-2 text-sm">Refresh positions</button>
      </div>
      <div id="tab-config" class="tabpanel flex-1 p-3 overflow-auto hidden">
        <div id="cfg-body" class="flex flex-col gap-3"></div>
      </div>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
